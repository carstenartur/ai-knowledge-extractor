name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'
      - name: Build
        run: gradle build
      - name: Verify consumer fixtures
        run: bash .github/scripts/verify-consumer-fixtures.sh
