name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'
      - name: Build
        run: gradle build
      - name: Publish artifacts to Maven local
        run: gradle publishToMavenLocal
      - name: Verify Gradle consumer fixture
        run: |
          gradle -p examples/fixtures/gradle-consumer generateAiKnowledgeIndex checkAiKnowledgeIndex publishAiKnowledgeIndex
          test -f examples/fixtures/gradle-consumer/build/ai-knowledge/index.json
          test -f examples/fixtures/gradle-consumer/build/ai-knowledge/check.json
          test -f examples/fixtures/gradle-consumer/docs/ai-knowledge/index.json
      - name: Verify Maven consumer fixture
        run: |
          VERSION=$(grep -E '^projectVersion=' gradle.properties | head -n 1 | cut -d'=' -f2 | tr -d '[:space:]')
          mvn -B -e -f examples/fixtures/maven-consumer/pom.xml \
            -DaiKnowledge.version="$VERSION" \
            -DaiKnowledge.outputDirectory="target/ai-knowledge" \
            -DaiKnowledge.seedDirectory="ai-knowledge" \
            -DaiKnowledge.modelProfileDirectory="ai-knowledge" \
            -DaiKnowledge.failOnWarnings=false \
            -DaiKnowledge.maxCognitiveDebt=1000.0 \
            org.aiknowledge:ai-knowledge-maven-plugin:"$VERSION":generate \
            org.aiknowledge:ai-knowledge-maven-plugin:"$VERSION":check 2>&1 | tee maven-consumer-fixture.log
          test -f examples/fixtures/maven-consumer/target/ai-knowledge/index.json
          test -f examples/fixtures/maven-consumer/target/ai-knowledge/check.json
      - name: Upload Maven fixture log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-consumer-fixture-log
          path: maven-consumer-fixture.log
          if-no-files-found: ignore
