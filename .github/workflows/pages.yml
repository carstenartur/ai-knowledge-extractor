name: Pages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'

      - name: Build and publish plugin to Maven local
        run: gradle build publishToMavenLocal

      - name: Generate Maven site
        run: |
          VERSION=$(grep -E '^projectVersion=' gradle.properties | head -n 1 | cut -d'=' -f2 | tr -d '[:space:]')
          mvn -B -f site/pom.xml -Drevision="$VERSION" process-resources site

      - name: Verify site content
        run: |
          test -f site/target/site/index.html
          test -f site/target/site/plugin-info.html
          test -f site/target/site/generate-mojo.html
          test -f site/target/site/analyze-mojo.html
          test -f site/target/site/optimize-mojo.html
          test -f site/target/site/benchmark-mojo.html
          test -f site/target/site/check-mojo.html
          test -f site/target/site/help-mojo.html
          grep -rl "generate" site/target/site/
          grep -rl "analyze" site/target/site/
          grep -rl "optimize" site/target/site/
          grep -rl "benchmark" site/target/site/
          grep -rl "check" site/target/site/
          grep -rl "help" site/target/site/
          if grep -r "/home/runner/" site/target/site/; then
            echo "Found forbidden absolute paths in generated site" >&2
            exit 1
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              echo "grep failed while checking for forbidden absolute paths" >&2
              exit "$status"
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/target/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
