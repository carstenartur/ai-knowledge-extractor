name: Pages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'

      - name: Build and publish plugin to Maven local
        run: gradle build publishToMavenLocal

      - name: Generate Maven site
        run: |
          VERSION=$(grep -E '^projectVersion=' gradle.properties | head -n 1 | cut -d'=' -f2 | tr -d '[:space:]')
          mvn -B -f site/pom.xml -Drevision="$VERSION" process-resources site

      - name: Generate test badge
        run: |
          python3 <<'PY'
          from pathlib import Path
          import html
          import json
          import shutil
          import xml.etree.ElementTree as ET

          results = sorted(Path('.').glob('*/build/test-results/test/TEST-*.xml'))
          if not results:
              raise SystemExit('No JUnit XML test result files found under */build/test-results/test/.')

          tests = failures = errors = skipped = 0
          for result in results:
              root = ET.parse(result).getroot()
              tests += int(root.attrib.get('tests', 0))
              failures += int(root.attrib.get('failures', 0))
              errors += int(root.attrib.get('errors', 0))
              skipped += int(root.attrib.get('skipped', 0))

          problems = failures + errors
          passed = max(tests - problems - skipped, 0)
          message = f"{passed}/{tests} passing" if tests else "0 tests"
          color = "brightgreen" if tests and problems == 0 else "red"

          tests_dir = Path('site/target/site/tests')
          tests_dir.mkdir(parents=True, exist_ok=True)
          (tests_dir / 'badge.json').write_text(json.dumps({
              "schemaVersion": 1,
              "label": "tests",
              "message": message,
              "color": color,
          }, ensure_ascii=False) + "\n", encoding='utf-8')

          report_root = tests_dir / 'reports'
          for report in Path('.').glob('*/build/reports/tests/test'):
              module = report.parts[0]
              destination = report_root / module
              if destination.exists():
                  shutil.rmtree(destination)
              shutil.copytree(report, destination)

          (tests_dir / 'index.html').write_text(f"""<!doctype html>
          <html lang=\"en\"><head><meta charset=\"utf-8\"><title>AI Knowledge Extractor tests</title></head>
          <body>
          <h1>AI Knowledge Extractor tests</h1>
          <p>{html.escape(message)}</p>
          <ul>
            <li>Total: {tests}</li>
            <li>Passed: {passed}</li>
            <li>Skipped: {skipped}</li>
            <li>Failures: {failures}</li>
            <li>Errors: {errors}</li>
          </ul>
          <p>Module reports are available under <code>reports/</code>.</p>
          </body></html>
          """, encoding='utf-8')
          PY

      - name: Verify site content
        run: |
          test -f site/target/site/index.html
          test -f site/target/site/plugin-info.html
          test -f site/target/site/generate-mojo.html
          test -f site/target/site/analyze-mojo.html
          test -f site/target/site/optimize-mojo.html
          test -f site/target/site/benchmark-mojo.html
          test -f site/target/site/check-mojo.html
          test -f site/target/site/help-mojo.html
          test -f site/target/site/tests/badge.json
          grep -rl "generate" site/target/site/
          grep -rl "analyze" site/target/site/
          grep -rl "optimize" site/target/site/
          grep -rl "benchmark" site/target/site/
          grep -rl "check" site/target/site/
          grep -rl "help" site/target/site/
          set +e
          grep -r "/home/runner/" site/target/site/
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Found forbidden absolute paths in generated site" >&2
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "grep failed while checking for forbidden absolute paths" >&2
            exit "$status"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/target/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
