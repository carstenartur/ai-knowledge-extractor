name: Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  site:
    name: Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'

      - name: Build and publish plugin to Maven local
        run: gradle build publishToMavenLocal

      - name: Generate Maven site
        run: |
          VERSION=$(grep -E '^projectVersion=' gradle.properties | head -n 1 | cut -d'=' -f2 | tr -d '[:space:]')
          mvn -B -f site/pom.xml -Drevision="$VERSION" process-resources site

      - name: Generate test badge and summary
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html
          import json
          import shutil
          import xml.etree.ElementTree as ET

          def write_json(path: Path, payload: dict) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(payload, separators=(",", ":")) + "\n", encoding="utf-8")

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          tests = failures = errors = skipped = 0
          suites = []
          for result in sorted(Path('.').glob('*/build/test-results/test/TEST-*.xml')):
              root = ET.parse(result).getroot()
              suite_tests = int(root.attrib.get('tests', 0))
              suite_failures = int(root.attrib.get('failures', 0))
              suite_errors = int(root.attrib.get('errors', 0))
              suite_skipped = int(root.attrib.get('skipped', 0))
              tests += suite_tests
              failures += suite_failures
              errors += suite_errors
              skipped += suite_skipped
              module = result.parts[0] if result.parts else 'root'
              suites.append((module, root.attrib.get('name', result.stem), suite_tests, suite_failures + suite_errors, suite_skipped))

          failed = failures + errors
          passed = max(tests - failed - skipped, 0)
          if tests == 0:
              message = 'no reports'
              color = 'lightgrey'
          elif failed:
              message = f'{failed}/{tests} failed'
              color = 'red'
          elif skipped:
              message = f'{passed} passed, {skipped} skipped'
              color = 'yellowgreen'
          else:
              message = f'{passed} passed'
              color = 'brightgreen'

          site_root = Path('site/target/site')
          write_json(site_root / 'badges' / 'tests.json', {
              'schemaVersion': 1,
              'label': 'tests',
              'message': message,
              'color': color,
          })

          tests_dir = site_root / 'tests'
          tests_dir.mkdir(parents=True, exist_ok=True)
          report_root = tests_dir / 'reports'
          for report in Path('.').glob('*/build/reports/tests/test'):
              module = report.parts[0]
              destination = report_root / module
              if destination.exists():
                  shutil.rmtree(destination)
              shutil.copytree(report, destination)

          suite_rows = "\n".join(
              "<tr>"
              f"<td>{esc(module)}</td>"
              f"<td>{esc(name)}</td>"
              f"<td>{suite_tests}</td>"
              f"<td>{suite_failed}</td>"
              f"<td>{suite_skipped}</td>"
              "</tr>"
              for module, name, suite_tests, suite_failed, suite_skipped in suites
          ) or '<tr><td colspan="5">No JUnit XML reports were generated.</td></tr>'

          (tests_dir / 'index.html').write_text(f'''<!doctype html>
          <html lang="en"><head><meta charset="utf-8"><title>AI Knowledge Extractor tests</title>
          <style>body{{font-family:system-ui,sans-serif;margin:2rem;max-width:1200px}}table{{border-collapse:collapse;width:100%}}td,th{{border:1px solid #ddd;padding:.5rem;text-align:left}}th{{background:#f6f8fa}}</style>
          </head><body><h1>AI Knowledge Extractor tests</h1>
          <p><strong>{passed}</strong> passed, <strong>{failed}</strong> failed, <strong>{skipped}</strong> skipped, <strong>{tests}</strong> total.</p>
          <table><thead><tr><th>Module</th><th>Suite</th><th>Tests</th><th>Failed</th><th>Skipped</th></tr></thead><tbody>{suite_rows}</tbody></table>
          </body></html>
          ''', encoding='utf-8')

          print(f'Tests badge: {message}')
          PY

      - name: Verify site content
        run: |
          test -f site/target/site/index.html
          test -f site/target/site/plugin-info.html
          test -f site/target/site/generate-mojo.html
          test -f site/target/site/analyze-mojo.html
          test -f site/target/site/optimize-mojo.html
          test -f site/target/site/benchmark-mojo.html
          test -f site/target/site/check-mojo.html
          test -f site/target/site/help-mojo.html
          test -f site/target/site/badges/tests.json
          test -f site/target/site/tests/index.html

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-site
          path: site/target/site
          retention-days: 14

      - name: Deploy to gh-pages branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/target/site
          destination_dir: site
