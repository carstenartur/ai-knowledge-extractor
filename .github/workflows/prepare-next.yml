name: Prepare next development version

on:
  workflow_dispatch:
    inputs:
      released_version:
        description: Published release version without leading v, e.g. 0.1.2
        required: true
        type: string
      next_development_version:
        description: Next development version, e.g. 0.1.3-SNAPSHOT
        required: true
        type: string
      dry_run:
        description: Validate and update locally, but do not push or create a PR
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-next:
    name: Prepare next development version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Prepare next development version
        env:
          RELEASED_VERSION: ${{ inputs.released_version }}
          NEXT_DEVELOPMENT_VERSION: ${{ inputs.next_development_version }}
          DRY_RUN: ${{ inputs.dry_run }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/prepare-next.sh
