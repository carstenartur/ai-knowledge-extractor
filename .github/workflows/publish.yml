name: Publish

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: Release version to publish
        required: false
        default: 0.1.0-SNAPSHOT

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: '9.5.1'
      - name: Resolve release version
        id: version
        shell: bash
        env:
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.releaseVersion }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${RELEASE_VERSION_INPUT}"
          fi
          release_version="${release_version//$'\r'/}"
          release_version="${release_version//$'\n'/}"
          printf 'value=%s\n' "$release_version" >> "$GITHUB_OUTPUT"
      - name: Publish to GitHub Packages
        run: gradle publish "-PreleaseVersion=${{ steps.version.outputs.value }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}